name: Update README and Index

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate README with GitHub Pages links
        run: |
          REPO_NAME="code-visualizer"
          BASE_URL="https://wkun-upenn.github.io/${REPO_NAME}"

          echo "# Code Visualizer" > README.md
          echo "" >> README.md
          echo "Interactive algorithm visualizers hosted on GitHub Pages." >> README.md
          echo "" >> README.md
          echo "## Visualizers" >> README.md
          echo "" >> README.md
          echo "| Visualizer | GitHub Pages Link |" >> README.md
          echo "|---|---|" >> README.md

          for f in *.html; do
            [ "$f" = "index.html" ] && continue
            [ ! -f "$f" ] && continue
            title=$(grep -oP '(?<=<title>).*?(?=</title>)' "$f" | head -1)
            if [ -z "$title" ]; then
              title=$(echo "$f" | sed 's/\.html$//' | sed 's/_/ /g' | sed 's/-/ /g')
            fi
            encoded=$(echo "$f" | sed 's/ /%20/g')
            echo "| $title | [${BASE_URL}/${encoded}](${BASE_URL}/${encoded}) |" >> README.md
          done

          echo "" >> README.md
          echo "---" >> README.md
          echo "*Auto-generated by GitHub Actions on $(date -u '+%Y-%m-%d %H:%M UTC')*" >> README.md

      - name: Generate index.html directory page
        run: |
          REPO_NAME="code-visualizer"
          BASE_URL="https://wkun-upenn.github.io/${REPO_NAME}"

          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Code Visualizer</title>
          <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body { font-family: system-ui, sans-serif; background: #fff; color: #1a1a1a; padding: 2rem; max-width: 640px; margin: 0 auto; }
            h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
            .subtitle { font-size: 13px; color: #888; margin-bottom: 2rem; }
            .card { display: block; padding: 14px 18px; border: 1px solid #e5e5e5; border-radius: 10px; margin-bottom: 10px; text-decoration: none; color: #1a1a1a; transition: border-color 0.15s; }
            .card:hover { border-color: #378ADD; background: #f8fbff; }
            .card-title { font-size: 15px; font-weight: 500; }
            .card-url { font-size: 12px; color: #888; margin-top: 2px; }
          </style>
          </head>
          <body>
          <h1>Code Visualizer</h1>
          <p class="subtitle">Interactive algorithm visualizers</p>
          <div id="list"></div>
          <script>
          HTMLEOF

          echo "const files = [" >> index.html
          for f in *.html; do
            [ "$f" = "index.html" ] && continue
            [ ! -f "$f" ] && continue
            title=$(grep -oP '(?<=<title>).*?(?=</title>)' "$f" | head -1)
            if [ -z "$title" ]; then
              title=$(echo "$f" | sed 's/\.html$//' | sed 's/_/ /g' | sed 's/-/ /g')
            fi
            echo "  {file: \"$f\", title: \"$title\"}," >> index.html
          done
          echo "];" >> index.html

          cat >> index.html << 'HTMLEOF'
          const list = document.getElementById('list');
          files.forEach(f => {
            const a = document.createElement('a');
            a.className = 'card';
            a.href = f.file;
            a.innerHTML = '<div class="card-title">' + f.title + '</div><div class="card-url">' + f.file + '</div>';
            list.appendChild(a);
          });
          if (files.length === 0) {
            list.innerHTML = '<p style="color:#888">No visualizers yet. Push an HTML file to get started.</p>';
          }
          </script>
          </body>
          </html>
          HTMLEOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md index.html
          git diff --staged --quiet || git commit -m "Auto-update README and index with visualizer links"
          git push
